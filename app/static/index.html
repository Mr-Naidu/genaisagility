<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Email Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Email Assistant</h1>
            <p>Powered by Gen-AI to classify and rewrite your emails instantly.</p>
        </header>

        <!-- Unified Form -->
        <div class="form-group">
            <label for="email-content">Email Content</label>
            <textarea id="email-content" placeholder="Paste your email here..."></textarea>
        </div>

        <div class="action-bar">
            <button class="submit-btn classify-action" onclick="classifyEmail()" id="classify-btn">
                <span>Classify</span>
                <div class="loader" id="classify-loader"></div>
            </button>

            <div class="rewrite-group">
                <select id="tone-select">
                    <option value="Professional">Professional</option>
                    <option value="Friendly">Friendly</option>
                    <option value="Formal">Formal</option>
                    <option value="Casual">Casual</option>
                </select>
                <button class="submit-btn rewrite-action" onclick="rewriteEmail()" id="rewrite-btn">
                    <span>Rewrite</span>
                    <div class="loader" id="rewrite-loader"></div>
                </button>
            </div>
        </div>

        <!-- Results -->
        <div class="result-container" id="result-box">
            <div class="result-title" id="result-title">Result</div>
            <div class="result-content" id="result-content"></div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
